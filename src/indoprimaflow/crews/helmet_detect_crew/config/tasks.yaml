research_task:
  description: >
    As a Senior Safety Analyzer, your task is to analyze the provided image located at {file_path} using the 'helmet_detection_tool' tool to identify how many people are not wearing helmets. 
    After conducting the analysis, you will need to compile a detailed report outlining the potential safety risks associated with non-compliance and provide recommendations for improving helmet compliance in the workplace.
  expected_output: >
    A comprehensive report that includes the number of individuals not wearing helmets, an assessment of the associated safety risks, and actionable recommendations for enhancing helmet compliance among workers.
  agent: researcher

analyzer_task:
  description: >
    As a Data Analyst, your task is to review the results from the 'research_task' 
    conducted by the Senior Safety Analyzer. 
    You will analyze the findings and insights provided in the report and send 
    this information to 'save_to_db_tool' tool.
  expected_output: >
    A structured entry in the database that captures the key insights and findings 
    from the research task, including the number of individuals 
    not wearing helmets, identified safety risks, 
    and recommended actions for improving helmet compliance.
  agent: analyzer
  context: 
    - research_task