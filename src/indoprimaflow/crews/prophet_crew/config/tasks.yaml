model_training_and_forecasting:
  description: >
    Use 'industrial_data_tools' tools to prepare and analyze data located at {file_path}. 
    Then, return the result to next agent to be processed.
  expected_output: >
    A forecast component object and a dataframe containing 'yhat', 
    'yhat_lower', and 'yhat_upper'.
  agent: prophet_forecasting_specialist

final_analysis_report:
  description: >
    Review the trend and seasonality components provided by previous agent and 
    write a summary of expected plant performance or maintenance needs.
  expected_output: >
    A comprehensive technical report summarizing the predicted behavior of 
    the cyclone system and any detected anomalies.
  agent: industrial_insight_analyst